name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.3-stable"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Godot headless executable
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip -d godot_bin
          chmod +x godot_bin/Godot_v${GODOT_VERSION}_linux.x86_64
          sudo mv godot_bin/Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          curl -L -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q templates.tpz -d /tmp/templates_extract
          mv /tmp/templates_extract/templates ~/.local/share/godot/export_templates/4.3.stable

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore /home/runner/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Write editor settings with real SDK paths
        run: |
          mkdir -p ~/.config/godot
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            > ~/.config/godot/editor_settings-4.tres
          echo "Using ANDROID_HOME=$ANDROID_HOME"
          echo "Using JAVA_HOME=$JAVA_HOME"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Import project
        run: godot --headless --import

      - name: Export APK
        run: |
          mkdir -p build
          godot --headless --verbose --export-debug "Android" build/rough-rider.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rough-rider-apk
          path: build/*.apk

      - name: Attach APK to a Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: build/*.apk
