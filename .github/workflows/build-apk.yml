name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore /home/runner/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Export APK
        uses: firebelley/godot-export@v8.0.0
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /home/runner/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: true
        	verbose: true

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rough-rider-apk
          path: build/**/*.apk

      - name: Attach APK to a Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: build/**/*.apk
